# A generic, single database configuration.

[alembic]
script_location = alembic
# file_template = %%(rev)s_%%(slug)s
# timezone = UTC
# truncate_slug_length = 40
# revision_environment = false
# sourceless = false

sqlalchemy.url = postgresql+asyncpg://dark:writeline@192.168.0.11:5432/pharmacy

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
